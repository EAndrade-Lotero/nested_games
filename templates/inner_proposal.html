{% macro inner_proposal(config) %}

<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
  font-family: Arial, sans-serif;
  background: #eceaea;
  display: block;
  justify-content: center;
  align-items: flex-start; /* ← change this */
  min-height: 100vh;
  margin: 0;
  overflow-y: auto;
  padding-top: 20px; /* optional spacing from top */
}

.tabletop {
  width: 700px;
  min-height: 650px;
  background: #eceaea;
  border-radius: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  position: relative;
  margin: auto;
}

#countdown {
  position: absolute;
  top: 15px;
  left: 20px;
  font-family: "Book Antiqua", Palatino, serif;
  font-size: 22px;
  font-weight: bold;
  color: rgb(83, 83, 83);
}

.zone {
  border: 2px solid #365c5c;
  border-radius: 12px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.center-top {
  width: 340px;
  height: 320px;
}

.center-middle {
  width: 340px;
  height: 250px;
}

.rectangle {
  width: 150px;
  height: 50px;
  background: rgb(221, 233, 255);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Book Antiqua", Palatino, serif;
  font-weight: bold;
  letter-spacing: 1px;
}

.basket {
  width: 250px;
  height: 150px;
  aspect-ratio: 1 / 1;
  background-image: url("../static/plate.png");
  background-size: contain;
  /* background-repeat: no-repeat; */
  background-position: center;
  position: relative;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 4px;
  padding: 10px;
}

.coin-pile {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.coin {
  width: 25px;
  aspect-ratio: 1 / 1;
  background-image: url("../static/coin.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  cursor: grab;
}

.avatar {
  width: 80px;
  height: 80px;
  background-image: url("../static/generic.png");
  background-size: cover;
  background-position: center;
  border-radius: 50%;
  position: relative;
  cursor: grab;
  user-select: none;
  color: white;
  font-weight: bold;
}

.avatar.partner {
  background-image: url("../static/generic.png");
}

.avatar.dragging {
  opacity: 0.5;
}

.avatar-label {
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  background: rgba(168, 168, 168, 0.5);
  padding: 2px 6px;
  border-radius: 6px;
}

.avatarzone {
  min-height: 90px;
  width: 30%;
  border: 0px dashed rgb(55, 0, 255);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  text-align: center;
}

.dropzone .avatar {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}

.card {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 16px;
    margin-top: 30px;
    margin-bottom: 30px;
}
label { display: grid; gap: 6px; font-size: 14px; }
input[type="number"] {
  width: 160px;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
}

.slider-row { display: grid; gap: 10px; margin-top: 8px; }
input[type="range"] { width: 100%; }

/* New: min (left), current (center, bigger), max (right) */
.min-current-max {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  width: 100%;
  font-size: 14px;
  margin-top: 2px;
}
.min-current-max .min { justify-self: start; }    .final-note {
    margin-top: 2em;
    font-weight: bold;
}
.min-current-max .max { justify-self: end; }
.min-current-max .current {
  justify-self: center;
  font-size: 18px; /* a bit larger */
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 999px;
  background: #f4f4f6;
}

</style>
</head>

<div>{{ config.text }}</div>
<div class="tabletop">

  <div id="countdown">02:00</div>

  <!-- TOP PLACE -->
  <div class="zone center-top">
    <div class="rectangle">RESPONDER</div>
    <div class="avatarzone">
        <div class="avatar partner" draggable="false" id="partner">
            <span class="avatar-label">Partner</span>
        </div>
    </div>
    <div class="basket" id="basket"></div>
  </div>

  <!-- SECOND PLACE (DROP TARGET) -->
  <div class="zone center-middle">
    <div class="coin-pile" id="coinPile">
    <div class="coin" draggable="false" id="coin1"></div>
    <div class="coin" draggable="false" id="coin2"></div>
    <div class="coin" draggable="false" id="coin3"></div>
    <div class="coin" draggable="false" id="coin4"></div>
    <div class="coin" draggable="false" id="coin5"></div>
    <div class="coin" draggable="false" id="coin6"></div>
    <div class="coin" draggable="false" id="coin7"></div>
    <div class="coin" draggable="false" id="coin8"></div>
    <div class="coin" draggable="false" id="coin9"></div>
    <div class="coin" draggable="false" id="coin10"></div>
    </div>
    <div class="rectangle">PROPOSER</div>
    <div class="avatarzone" id="dropzone">
        <div class="avatar" draggable="false" id="me">
        <span class="avatar-label">Me</span>
        </div>
    </div>
  </div>

  </div>
<div class="card">
<div class="slider-row">
  <input id="slider" type="range" />

  <div class="min-current-max">
    <div class="min">Min: <strong id="minLabel"></strong></div>
    <div class="current"><span id="currentLabel"></span> coins</div>
    <div class="max">Max: <strong id="maxLabel"></strong></div>
  </div>
</div>
</div>

<script>
    const basket = document.getElementById("basket");
    const coinPile = document.getElementById("coinPile");
    const TOTAL_COINS = {{ config.endowment }}; // adjust if needed

    function updateCoins(value) {
      basket.innerHTML = "";
      coinPile.innerHTML = "";

      const basketCoins = Math.round(value);
      const pileCoins = TOTAL_COINS - basketCoins;

      // Fill basket
      for (let i = 0; i < basketCoins; i++) {
        const coin = document.createElement("div");
        coin.classList.add("coin");
        basket.appendChild(coin);
      }

      // Fill remaining pile
      for (let i = 0; i < pileCoins; i++) {
        const coin = document.createElement("div");
        coin.classList.add("coin");
        coinPile.appendChild(coin);
      }
    }

    let timeRemaining = {{ config.timeout }};

    function updateClock() {
      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;

      document.getElementById("countdown").textContent =
        `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

      if (timeRemaining > 0) {
        timeRemaining--;
      } else {
        clearInterval(timer);
        console.log(`${timeRemaining} seconds`);
        document.dispatchEvent(new Event("done"));
        psynet.trial.registerEvent(
            "done",
            {info: "timeout"}
          );
      }
    }

    updateClock();

    const timer = setInterval(updateClock, 1000);

    const slider = document.getElementById("slider");
    const minLabel = document.getElementById("minLabel");
    const maxLabel = document.getElementById("maxLabel");
    const currentLabel = document.getElementById("currentLabel");

    const use_percentage = "{{ config.use_percentage }}";

    function clamp(x, lo, hi) {
      return Math.min(hi, Math.max(lo, x));
    }

    function computeStep(min, max, steps) {
      if ("{{ config.integer_rule }}" === "True") {
          return (max + 1 - min) / steps;
      }  else {
          return (max - min) / steps;
      }
    }

    function formatNumber(x) {
      if (Number.isInteger(x)) return String(x);
      return x.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function snapToStep(value, min, step) {
      const k = Math.round((value - min) / step);
      return min + k * step;
    }

    function updateSliderConfig(keepCurrent = true) {
      let min = {{ config.min_value }};
      let max = {{ config.max_value }};
      let steps = {{ config.n_steps }};

      const step = computeStep(min, max, steps);

      slider.min = String(min);
      slider.max = String(max);
      slider.step = String(step);

      let current = Number({{ config.start_value }});

      current = clamp(current, min, max);
      current = snapToStep(current, min, step);
      slider.value = String(current);

      if (use_percentage  === "True") {
          minLabel.textContent = String(0);
          maxLabel.textContent = String(100);
          currentLabel.textContent = formatNumber(current * 100);
      } else {
          minLabel.textContent = formatNumber(min);
          maxLabel.textContent = formatNumber(max);
          currentLabel.textContent = formatNumber(current);
      }
    }

    function onSliderInput() {
      const min = Number(slider.min);
      const max = Number(slider.max);
      const step = Number(slider.step);

      let v = Number(slider.value);
      v = clamp(v, min, max);
      v = snapToStep(v, min, step);
      slider.value = String(v);

      if (use_percentage  === "True") {
        currentLabel.textContent = formatNumber(v * 100);
      } else {
        currentLabel.textContent = formatNumber(v);
      }

      updateCoins(v);
    }

    slider.addEventListener("input", onSliderInput);

    updateSliderConfig(false);


    /////////////////////////////////////////////////////
    // Function to stage the response for PsyNet
    /////////////////////////////////////////////////////
    psynet.stageResponse = function() {
          psynet.response.staged.rawAnswer = slider.value;
    }

</script>
{% endmacro %}
