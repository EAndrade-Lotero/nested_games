{% macro likert(config) %}

<div class="likert-control{% if config.timer_enabled %} likert-has-timer{% endif %}">
  <style>
    .likert-control {
      position: relative;
      font-family: inherit;
      max-width: 42rem;
      margin: 0 auto;
      padding: 0.25rem 0 1rem;
    }

    .likert-control.likert-has-timer {
      padding-top: 2.5rem;
    }

    .likert-control .likert-countdown {
      position: absolute;
      top: 0;
      left: 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: #535353;
      line-height: 1.2;
      z-index: 1;
    }

    .likert-control .likert-scale-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 0.5rem 0.25rem;
      margin-top: 1rem;
    }

    .likert-control .likert-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }

    .likert-control .likert-option input[type="radio"] {
      margin: 0;
      cursor: pointer;
    }

    .likert-control .likert-option label {
      margin: 0;
      cursor: pointer;
      user-select: none;
      font-weight: 500;
    }

    .likert-control .likert-end-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: #555;
      gap: 1rem;
    }
  </style>

  {% if config.timer_enabled %}
  <div class="likert-countdown" id="likert-countdown" aria-live="polite">00:00</div>
  {% endif %}

  <div class="likert-scale-row" id="likert-scale"></div>

  <div class="likert-end-labels">
    <span id="min-label"></span>
    <span id="max-label"></span>
  </div>

  <script>
    /************* CUSTOMIZE HERE *************/

    const scalePoints = {{ config.n_steps }};
    const minLabel = {{ config.lowest_value | tojson }};
    const maxLabel = {{ config.highest_value | tojson }};

    /*****************************************/

    let selectedValue = null;

    function createLikertScale() {
      const container = document.getElementById("likert-scale");

      for (let i = 1; i <= scalePoints; i++) {
        const option = document.createElement("div");
        option.className = "likert-option";

        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "likert";
        radio.value = String(i);
        radio.id = "likert-radio-" + i;

        radio.onclick = () => {
          selectedValue = i;
        };

        const label = document.createElement("label");
        label.htmlFor = radio.id;
        label.innerText = String(i);

        option.appendChild(radio);
        option.appendChild(label);

        container.appendChild(option);
      }

      document.getElementById("min-label").innerText = minLabel;
      document.getElementById("max-label").innerText = maxLabel;
    }

    createLikertScale();

    const likertTimerEnabled = {{ config.timer_enabled | tojson }};
    const timeoutAnswerMode = {{ config.timeout_answer_mode | tojson }};
    const timeoutAnswerFixed = {{ config.timeout_answer_fixed }};
    let timeRemaining = {{ config.timeout }};
    let likertCountdownTimer = null;

    function resolveTimeoutSubmission() {
      if (selectedValue !== null) {
        return selectedValue;
      }
      if (timeoutAnswerMode === "random") {
        return 1 + Math.floor(Math.random() * scalePoints);
      }
      if (timeoutAnswerMode === "none") {
        return null;
      }
      return timeoutAnswerFixed;
    }

    function updateCountdown() {
      const el = document.getElementById("likert-countdown");
      if (!el) return;

      const minutes = Math.floor(timeRemaining / 60);
      const seconds = timeRemaining % 60;
      el.textContent =
        String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");

      if (timeRemaining > 0) {
        timeRemaining -= 1;
      } else {
        clearInterval(likertCountdownTimer);
        likertCountdownTimer = null;
        const timeoutAnswer = resolveTimeoutSubmission();
        psynet.response.disable();
        psynet.submit.disable();
        psynet.nextPage(timeoutAnswer);
      }
    }

    if (likertTimerEnabled) {
      updateCountdown();
      likertCountdownTimer = setInterval(updateCountdown, 1000);
    }

    /////////////////////////////////////////////////////
    // Function to stage the response for PsyNet
    /////////////////////////////////////////////////////
    psynet.stageResponse = function () {
      psynet.response.staged.rawAnswer = selectedValue;
    };
  </script>
</div>

{% endmacro %}
