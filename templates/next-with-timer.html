{% macro next_with_timer(config) %}

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eceaea;
    }

    .top-bar {
        position: fixed;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 10;
        gap: 1rem;
        pointer-events: none;
    }

    .top-bar > * {
        pointer-events: auto;
    }

    .next-btn {
        background: #2563eb;
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .next-btn:hover {
        background: #1d4ed8;
    }

    /* Timer (top right) — same pattern as custom-prompt-with-timer.html */
    .timer-container {
        background: white;
        padding: 12px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        font-size: 22px;
        font-weight: bold;
    }

    .timeout-prompt-body {
        position: relative;
        z-index: 1;
        max-width: 48rem;
        margin: 0 auto 1rem;
        padding: 5rem 1.25rem 0;
        line-height: 1.5;
        color: #222;
    }

    .timeout-prompt-body h2 {
        margin-top: 0;
    }
</style>

<div class="top-bar">
    <button type="button" class="next-btn" id="next-with-timer-btn">Next</button>
    <div class="timer-container" id="timer">00:18</div>
</div>

<div class="timeout-prompt-body">
    {{ config.text|safe }}
</div>

<script>
let timeRemaining = {{ config.timeout }};
let timerInterval = null;

function updateTimer() {
    let minutes = Math.floor(timeRemaining / 60);
    let seconds = timeRemaining % 60;

    seconds = seconds < 10 ? "0" + seconds : seconds;

    document.getElementById("timer").textContent =
        "Time left: " + minutes + ":" + seconds;

    if (timeRemaining > 0) {
        timeRemaining--;
    } else {
        clearInterval(timerInterval);
        document.getElementById("timer").textContent = "Time's up!";
        psynet.trial.registerEvent(
            "done",
            {info: "timeout"}
          );
        const timeoutAnswer = "{{ config.timeout_answer }}";
        psynet.nextPage(timeoutAnswer);
    }
}

function clearTimer() {
    if (timerInterval !== null) {
        clearInterval(timerInterval);
        timerInterval = null;
    }
}

updateTimer();
timerInterval = setInterval(updateTimer, 1000);

document.getElementById("next-with-timer-btn").addEventListener("click", function () {
    clearTimer();
    psynet.nextPage();
});
</script>

{% endmacro %}
