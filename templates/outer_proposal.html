{% macro outer_proposal(config) %}

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eceaea;
        display: flex;
        justify-content: center;
        align-items: flex-start; /* ← change this */
        min-height: 100vh;
        margin: 0;
        overflow-y: auto;
        padding-top: 20px; /* optional spacing from top */
    }

    .tabletop {
        width: 700px;
        min-height: 400px;
        background: #eceaea;
        border-radius: 20px;
        padding: 20px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        position: relative;
        margin: auto;
        gap: 20px;
    }

    #phase-label {
        position: absolute;
        top: 15px;
        right: 20px;
        font-family: "Book Antiqua", Palatino, serif;
        font-size: 22px;
        font-weight: bold;
        color: rgb(83, 83, 83);
        text-align: right;
    }

    #countdown {
        position: absolute;
        top: 15px;
        left: 20px;
        font-family: "Book Antiqua", Palatino, serif;
        font-size: 22px;
        font-weight: bold;
        color: rgb(83, 83, 83);
    }

    .zone {
        border: 2px solid #365c5c;
        border-radius: 12px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    .center-top {
        width: 300px;
        height: 280px;
    }

    .center-middle {
        width: 200px;
        height: 220px;
    }

    .center-bottom {
        flex-direction: column;
        justify-content: center;
    }

    .rectangle {
        width: 150px;
        height: 50px;
        background: rgb(221, 233, 255);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Book Antiqua", Palatino, serif;
        font-weight: bold;
        letter-spacing: 1px;
    }

    .basket {
        width: 200px;
        height: 100px;
        /* background-image: url("{{ config.plate_url }}"); */
        background-image: url("../static/plate.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        position: relative;
    }

    .coin-pile {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
    }

    .coin {
        width: 25px;
        aspect-ratio: 1 / 1;
        /* background-image: url("{{ config.coin_url }}"); */
        background-image: url("../static/coin.png");
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        cursor: grab;
    }

    .avatar {
        width: 80px;
        height: 80px;
        {#background-image: url("{{ config.generic_url }}");#}
        background-image: url("../static/generic.png");
        background-size: cover;
        background-position: center;
        border-radius: 50%;
        position: relative;
        cursor: grab;
        user-select: none;
        color: white;
        font-weight: bold;
    }

    .avatar.partner {
        {#background-image: url("{{ config.generic_url }}");#}
        background-image: url("../static/generic.png");
    }

    .avatar.dragging {
        opacity: 0.5;
    }

    .avatar-label {
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 14px;
        background: rgba(168, 168, 168, 0.5);
        padding: 2px 6px;
        border-radius: 6px;
    }

    .dropzone {
        min-height: 90px;
        width: 100%;
        border: 2px dashed rgb(55, 0, 255);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        text-align: center;
    }

    .avatarzone {
        min-width: 80px;
        min-height: 90px;
        border: 2px dashed rgb(55, 0, 255);
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        text-align: center;
    }

    .dropzone .avatar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }
</style>

<div class="tabletop">

    <div id="countdown">
        00:30
    </div>

    <div id="phase-label">
        Round {{ config.round }} / {{ config.num_rounds }}
    </div>


  <!-- TOP PLACE -->
  <div class="zone center-top">
    <div class="rectangle">RESPONDER</div>
      <div class="avatarzone">
    </div>
    <div class="basket"></div>
  </div>

  <!-- SECOND PLACE (DROP TARGET) -->
  <div class="zone center-middle">
    <div class="rectangle">PROPOSER</div>
    <div class="dropzone" id="dropzone">
      <span class="dropzone-text">
          Drop avatar here
      </span>
    </div>
    <div class="coin-pile">
      {% for i in range(10) %}
        <div id="coin{{ i }}" class="coin"></div>
      {% endfor %}
    </div>
  </div>

  <!-- THIRD PLACE (AVATARS SOURCE) -->
  <div class="zone center-bottom">
    <div class="avatar" draggable="true" id="me">
        <span class="avatar-label">Me</span>
    </div>
    <div class="avatar partner" draggable="true" id="partner">
        <span class="avatar-label">Partner</span>
    </div>
  </div>

</div>


<script>
    const avatars = document.querySelectorAll('.avatar');
    const dropzone = document.getElementById('dropzone');
    const bottomZone = document.querySelector('.center-bottom');

    avatars.forEach(avatar => {
        avatar.addEventListener('dragstart', e => {
            avatar.classList.add('dragging');
            e.dataTransfer.setData('text/plain', avatar.id);
        });

        avatar.addEventListener('dragend', () => {
            avatar.classList.remove('dragging');
        });
    });

    dropzone.addEventListener('dragover', e => {
        e.preventDefault();
    });

    dropzone.addEventListener('drop', e => {
        e.preventDefault();

        // allow only ONE avatar inside dropzone
        if (dropzone.querySelector('.avatar')) {
            return;
        }

        const id = e.dataTransfer.getData('text/plain');
        const avatar = document.getElementById(id);

        dropzone.appendChild(avatar);
    });

    bottomZone.addEventListener('dragover', e => {
        e.preventDefault();
    });

    bottomZone.addEventListener('drop', e => {
        e.preventDefault();

        const id = e.dataTransfer.getData('text/plain');
        const avatar = document.getElementById(id);

        bottomZone.appendChild(avatar);
    });

    let timeRemaining = {{ config.timeout }};

    function updateClock() {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;

        document.getElementById("countdown").textContent =
            `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

        if (timeRemaining > 0) {
            timeRemaining--;
        } else {
            clearInterval(timer);
            document.dispatchEvent(new Event("done"));
            psynet.trial.registerEvent(
                "done",
                {info: "timeout"}
              );
            const timeoutProposer = "No answer";
            psynet.nextPage(timeoutProposer);
        }
    }

    updateClock();

    const timer = setInterval(updateClock, 1000);

    /////////////////////////////////////////////////////
    // Function to stage the response for PsyNet
    /////////////////////////////////////////////////////
    psynet.stageResponse = function() {

        const proposerAvatar = dropzone.querySelector('.avatar');

        console.log("Staging response. Proposer avatar:", proposerAvatar);

        let proposer = null;
        if (proposerAvatar) {
            proposer = proposerAvatar.id === 'me' ? 'self' : 'other';
        }
        psynet.response.staged.rawAnswer = proposer;
    }

</script>

{% endmacro %}
