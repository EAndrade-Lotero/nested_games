{% macro outer_proposal_tutorial(config) %}

<style>
  body {
    font-family: sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    height: 100vh;
  }

  .container {
    position: relative;
    width: 700px;
    height: 0;
  }

  .player {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .partner {
    top: -5px;
    /* left: 50%; */
    transform: translateX(30%);
  }

  .me {
    bottom: -10px;
    left: 50%;
    transform: translateX(-20%);
  }

  .avatar {
    flex-shrink: 0;
    width: 80px;
    height: 80px;
    background-image: url("../static/generic.png");
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    position: relative;
    cursor: grab;
    user-select: none;
    color: white;
    font-weight: bold;
  }
  
  .avatar.partner {
    width: 65px;
    height: 65px;
  }

  .bowl {
    height: 80px;
    width: auto;
    object-fit: contain;
    flex-shrink: 0;
    display: block;
  }

  .bowl.partner {
    height: 65px;
  }

  .bowl-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .bowl-label {
    font-size: 0.85rem;
    text-align: left;
    line-height: 1.2;
  }

  /* Adjust horizontal nudge for each bowl caption independently */
  .bowl-label-partner {
    transform: translateX(60%);
  }

  .bowl-label-me {
    transform: translateX(5%);
  }

  .player-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .player-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
    gap: 12px;
  }

  .player-row.me-row {
    gap: 20px;
  }

  .player-label {
    text-align: center;
    transform: translateX(80%);
  }

  .dropzone {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 70px;
    height: 70px;
    border: 2px dashed #2f4f4f;
    border-radius: 10px;
    margin: 0;
    background: #f2f2f2;
  }

  .dropzone.partner {
    width: 55px;
    height: 55px;
  }

  .table {
    position: relative;
    top: 10px;
    left: 150px;
    width: 400px;
    height: 200px;
    background: #d5c39b;
    clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
  }

  .coins {
    position: absolute;
    top: 150px;
    right: 60px;
  }

  .coin {
    width: 60px;
    height: 75px;
    align-items: center;
    margin: 4px;
    font-weight: bold;
    cursor: grab;
    user-select: none;
    background-size: cover;
    background-position: center;
    background-image: url("../static/coin.png");
  }

  .coin:active {
    cursor: grabbing;
  }

  .outer-proposal-tutorial-popup[hidden] {
      display: none !important;
    }
  
    .outer-proposal-tutorial-popup {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }
  
    .outer-proposal-tutorial-popup__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
    }
  
    .outer-proposal-tutorial-popup__panel {
      position: relative;
      z-index: 1;
      max-width: 28rem;
      width: 100%;
      max-height: min(80vh, 100%);
      overflow: auto;
      /* Semitransparent “glass” so the table behind is faintly visible */
      background: rgba(255, 255, 255, 0.88);
      border-radius: 10px;
      padding: 1.25rem 1.4rem 1.1rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.22);
      color: #222;
      line-height: 1.5;
    }
  
    .outer-proposal-tutorial-popup__panel p:last-child {
      margin-bottom: 0;
    }
  
    .outer-proposal-tutorial-popup__content {
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
  
    .outer-proposal-tutorial-popup__dismiss {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: #0d6efd;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  
    .outer-proposal-tutorial-popup__dismiss:hover {
      background: #0b5ed7;
    }
  
</style>

<div class="container">

    <div class="player partner">
      <div class="player-stack">
        <div class="player-row">
          <div class="bowl-stack">
            <img class="bowl partner" src="../static/bowl.png" alt="" />
            <div class="bowl-label bowl-label-partner">0 coins</div>
          </div>
          <div class="avatar partner"></div>
          <div class="dropzone partner" id="partnerZone"></div>
        </div>
        <div class="player-label">Partner</div>
      </div>
    </div>

    <div class="table"></div>

<div class="player me">
  <div class="player-stack">
    <div class="player-row me-row">
      <div class="bowl-stack">
        <img class="bowl" src="../static/bowl.png" alt="" />
        <div class="bowl-label bowl-label-me">0 coins</div>
      </div>
      <div class="avatar"></div>
      <div class="dropzone" id="myZone"></div>
    </div>
    <div class="player-label">Me</div>
  </div>
</div>

  <div class="coins" id="coinPile"></div>

  <div class="outer-proposal-tutorial-popup" id="outer-proposal-tutorial-popup" hidden>
    <div class="outer-proposal-tutorial-popup__backdrop" aria-hidden="true"></div>
    <div class="outer-proposal-tutorial-popup__panel">
      <div class="outer-proposal-tutorial-popup__content">
        <p>Excellent! Press the continue button to proceed to the next page.</p>
      </div>
      <button type="button" class="outer-proposal-tutorial-popup__dismiss">Continue</button>
    </div>
  </div>

</div>

<script>

let outerProposalTutorialPopupShown = false;
/** Drop zone id for the configured avatar target ("me" → myZone, "partner" → partnerZone). */
const TARGET_ZONE_ID = "{{ config.avatar }}" === "partner" ? "partnerZone" : "myZone";
const coinPile = document.getElementById("coinPile");

// Create coins dynamically
for (let i = 0; i < 1; i++) {
  const coin = document.createElement("div");
  coin.className = "coin";
  coin.draggable = true;

  coin.addEventListener("dragstart", dragStart);

  coinPile.appendChild(coin);
}

const zones = document.querySelectorAll(".dropzone");

zones.forEach(zone => {
  zone.addEventListener("dragover", dragOver);
  zone.addEventListener("drop", drop);
});

coinPile.addEventListener("dragover", dragOver);
coinPile.addEventListener("drop", drop);

let draggedCoin = null;

function dragStart(e) {
  draggedCoin = this;
}

function dragOver(e) {
  e.preventDefault();
}

function drop(e) {
  if (draggedCoin) {

    this.appendChild(draggedCoin);

    // Resize coin depending on location
    if (this.id === "partnerZone") {
      draggedCoin.style.transform = "scale(0.85)";
    }
    else if (this.id === "myZone") {
      draggedCoin.style.transform = "scale(1.3)";
    }
    else {
      draggedCoin.style.transform = "scale(1)";
    }
    draggedCoin = null;
  }

  if (this.id !== TARGET_ZONE_ID) return;
  if (outerProposalTutorialPopupShown) return;
  outerProposalTutorialPopupShown = true;

  const popup = document.getElementById('outer-proposal-tutorial-popup');
  if (popup) {
    popup.removeAttribute('hidden');
    popup.dispatchEvent(new CustomEvent('outer-proposal-tutorial-popup-show', { bubbles: true }));
  }

}

(function () {
  const btn = document.querySelector('#outer-proposal-tutorial-popup .outer-proposal-tutorial-popup__dismiss');
  if (!btn) return;
  btn.addEventListener('click', function () {
    psynet.nextPage("Tutorial_Ok");
  });
})();

</script>

{% endmacro %}
