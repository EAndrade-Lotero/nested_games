{% macro slider_values(config) %}

  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { margin: 24px; max-width: 820px; }

    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 30px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    label { display: grid; gap: 6px; font-size: 14px; }
    input[type="number"] {
      width: 160px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 10px;
    }

    .slider-row { display: grid; gap: 10px; margin-top: 8px; }
    input[type="range"] { width: 100%; }

    /* New: min (left), current (center, bigger), max (right) */
    .min-current-max {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
      font-size: 14px;
      margin-top: 2px;
    }
    .min-current-max .min { justify-self: start; }    .final-note {
        margin-top: 2em;
        font-weight: bold;
    }
    .min-current-max .max { justify-self: end; }
    .min-current-max .current {
      justify-self: center;
      font-size: 18px; /* a bit larger */
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 999px;
      background: #f4f4f6;
    }

  </style>

  <div class="card">
    <div class="slider-row">
      <input id="slider" type="range" />

      <div class="min-current-max">
        <div class="min">Min: <strong id="minLabel"></strong></div>
        <div class="current">{{ config.left_label }} <span id="currentLabel"></span> {{ config.right_label }}</div>
        <div class="max">Max: <strong id="maxLabel"></strong></div>
      </div>
    </div>
  </div>
  <div>
  </div>
    <p class="final-note">
        If you are ready to continue, press the 'Next' button.
    </p>

<script>
    const slider = document.getElementById("slider");
    const minLabel = document.getElementById("minLabel");
    const maxLabel = document.getElementById("maxLabel");
    const currentLabel = document.getElementById("currentLabel");

    const use_percentage = "{{ config.use_percentage }}";

    function clamp(x, lo, hi) {
      return Math.min(hi, Math.max(lo, x));
    }

    function computeStep(min, max, steps) {
      if ("{{ config.integer_rule }}" === "True") {
          return (max + 1 - min) / steps;
      }  else {
          return (max - min) / steps;
      }
    }

    function formatNumber(x) {
      if (Number.isInteger(x)) return String(x);
      return x.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function snapToStep(value, min, step) {
      const k = Math.round((value - min) / step);
      return min + k * step;
    }

    function updateSliderConfig(keepCurrent = true) {
      let min = {{ config.min_value }};
      let max = {{ config.max_value }};
      let steps = {{ config.n_steps }};

      const step = computeStep(min, max, steps);

      slider.min = String(min);
      slider.max = String(max);
      slider.step = String(step);

      let current = Number({{ config.start_value }});

      current = clamp(current, min, max);
      current = snapToStep(current, min, step);
      slider.value = String(current);

      if (use_percentage  === "True") {
          minLabel.textContent = String(0);
          maxLabel.textContent = String(100);
          currentLabel.textContent = formatNumber(current * 100);
      } else {
          minLabel.textContent = formatNumber(min);
          maxLabel.textContent = formatNumber(max);
          currentLabel.textContent = formatNumber(current);
      }
    }

    function onSliderInput() {
      const min = Number(slider.min);
      const max = Number(slider.max);
      const step = Number(slider.step);

      let v = Number(slider.value);
      v = clamp(v, min, max);
      v = snapToStep(v, min, step);
      slider.value = String(v);

      if (use_percentage  === "True") {
        currentLabel.textContent = formatNumber(v * 100);
      } else {
        currentLabel.textContent = formatNumber(v);
      }
    }

    slider.addEventListener("input", onSliderInput);

    updateSliderConfig(false);


    /////////////////////////////////////////////////////
    // Function to stage the response for PsyNet
    /////////////////////////////////////////////////////
    psynet.stageResponse = function() {
          psynet.response.staged.rawAnswer = slider.value;
    }

</script>

{% endmacro %}
