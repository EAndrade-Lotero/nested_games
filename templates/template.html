<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drag Coins Tabletop</title>
<style>
  body {
    font-family: sans-serif;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    position: relative;
    width: 700px;
    height: 450px;
  }

  .player {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .partner {
    top: -5px;
    left: 50%;
    transform: translateX(-40%);
  }

  .me {
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
  }

  .avatar {
    width: 80px;
    height: 80px;
    background-image: url("../static/generic.png");
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    position: relative;
    cursor: grab;
    user-select: none;
    color: white;
    font-weight: bold;
  }
  
  .avatar.partner {
    width: 65px;
    height: 65px;
  }  

  .dropzone {
    width: 70px;
    height: 70px;
    border: 2px dashed #2f4f4f;
    border-radius: 10px;
    margin: 8px auto;
    background: #f2f2f2;
  }

  .dropzone.partner {
    width: 55px;
    height: 55px;
  }  

  .table {
    position: absolute;
    top: 100px;
    left: 150px;
    width: 400px;
    height: 200px;
    background: #8d8570;
    clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
  }

  .coins {
    position: absolute;
    top: 170px;
    right: 60px;
  }

  .coin {
    width: 40px;
    height: 40px;
    align-items: center;
    margin: 4px;
    font-weight: bold;
    cursor: grab;
    user-select: none;
    background-image: url("../static/gold_coins.png");
    background-size: cover;
    background-position: center;
  }

  .coin:active {
    cursor: grabbing;
  }

</style>
</head>
<body>

<div class="container">

    <div class="player partner">
    <div>
        <div>Partner</div>
        <div style="display:flex; align-items:center; gap:12px;">
        <div class="avatar partner"></div>
        <div class="dropzone partner" id="partnerZone"></div>
        </div>
    </div>
    </div>

    <div class="table"></div>

<div class="player me">
  <div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="avatar"></div>
      <div class="dropzone" id="myZone"></div>
    </div>
    <div>Me</div>
  </div>
</div>

  <div class="coins" id="coinPile"></div>

</div>

<script>

const coinPile = document.getElementById("coinPile");

// Create coins dynamically
for (let i = 0; i < 1; i++) {
  const coin = document.createElement("div");
  coin.className = "coin";
  coin.draggable = true;
  coin.innerText = "$";

  coin.addEventListener("dragstart", dragStart);

  coinPile.appendChild(coin);
}

const zones = document.querySelectorAll(".dropzone");

zones.forEach(zone => {
  zone.addEventListener("dragover", dragOver);
  zone.addEventListener("drop", drop);
});

coinPile.addEventListener("dragover", dragOver);
coinPile.addEventListener("drop", drop);

let draggedCoin = null;

function dragStart(e) {
  draggedCoin = this;
}

function dragOver(e) {
  e.preventDefault();
}

function drop(e) {
  if (draggedCoin) {
    this.appendChild(draggedCoin);
    draggedCoin = null;
  }
}

</script>

</body>
</html>
